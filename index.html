// 全局变量
let cur = 0;
let ans = [];

// 提示框
function toast(msg){
    let t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
}

// 切换页面
function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
    document.getElementById(id).classList.add("show");
}

// 首页→答题
function goTest(){cur=0;ans=[];render();show("test");}
// 结果→首页
function goHome(){show("home");}

// 渲染题目
function render(){
    document.getElementById("q-text").textContent = questions[cur];
    document.getElementById("bar").style.width = ((cur+1)/40*100)+"%";
    document.getElementById("count").textContent = `${cur+1} / 40`;
    
    let opt = document.getElementById("opt-box");
    opt.innerHTML = "";
    let opts = ["完全符合","比较符合","中立/不确定","不太符合","完全不符合"];
    opts.forEach((t,i)=>{
        let d = document.createElement("div");
        d.className = `option ${ans[cur]===i?"selected":""}`;
        d.innerHTML = `<span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${t}</span>`;
        d.onclick = ()=>{ans[cur]=i;render();};
        opt.appendChild(d);
    });
    
    document.getElementById("prev").disabled = cur===0;
    document.getElementById("next").disabled = ans[cur]===undefined;
    document.getElementById("next").textContent = cur===39?"查看结果":"下一题";
}

// 上一题
function prev(){if(cur>0){cur--;render();}}
// 下一题/计算结果
function next(){
    if(ans[cur]===undefined)return;
    if(cur<39){cur++;render();}else{calc();}
}

// 计算结果+维度百分比
function calc(){
    const scoreMap = [4,3,2,1,0];
    const scores = [];
    
    // 计算四个维度得分
    for(let d=0;d<4;d++){
        const [pos, neg] = dimRules[d];
        let total = 0;
        pos.forEach(i=>total += scoreMap[ans[i]]);
        neg.forEach(i=>total += 4 - scoreMap[ans[i]]);
        scores.push(total);
    }

    // 生成编码
    let code = "";
    for(let i=0;i<4;i++){
        const [high, low] = dimNames[i];
        code += scores[i] > 20 ? high : low;
    }

    // 计算每个维度的高位百分比（单维度总分40）
    const ovPercent = Math.round((scores[0]/40)*100);
    const rnPercent = Math.round((scores[1]/40)*100);
    const amPercent = Math.round((scores[2]/40)*100);
    const lgPercent = Math.round((scores[3]/40)*100);

    // 渲染维度进度条
    document.getElementById("ov-bar").style.width = `${ovPercent}%`;
    document.getElementById("ov-percent").textContent = `${ovPercent}% O`;
    document.getElementById("rn-bar").style.width = `${rnPercent}%`;
    document.getElementById("rn-percent").textContent = `${rnPercent}% R`;
    document.getElementById("am-bar").style.width = `${amPercent}%`;
    document.getElementById("am-percent").textContent = `${amPercent}% A`;
    document.getElementById("lg-bar").style.width = `${lgPercent}%`;
    document.getElementById("lg-percent").textContent = `${lgPercent}% L`;

    // 渲染基础结果（自动加载对应图片）
    const res = resData[code];
    document.getElementById("animal-img").src = res.img;
    document.getElementById("r-code").textContent = `【${code}】`;
    document.getElementById("r-animal").textContent = res.animal;
    document.getElementById("r-desc").textContent = res.desc;
    
    show("result");
}

// 复制结果
function copyRes(){
    const code = document.getElementById("r-code").textContent;
    const animal = document.getElementById("r-animal").textContent;
    const desc = document.getElementById("r-desc").textContent;
    
    const text = `不如诗啊·林间生灵粉丝人格测试
结果：${code} ${animal}

四维人格倾向：
${document.getElementById("ov-percent").textContent} · Outgoing 高社交互动型
${100-parseInt(document.getElementById("ov-percent").textContent)}% · Vigilant 独赏静默型
${document.getElementById("rn-percent").textContent} · Rooted 深度真爱型
${100-parseInt(document.getElementById("rn-percent").textContent)}% · Nomadic 浅度随缘型
${document.getElementById("am-percent").textContent} · Artistic 内容至上型
${100-parseInt(document.getElementById("am-percent").textContent)}% · Mortal 人本至上型
${document.getElementById("lg-percent").textContent} · Logical 冷静理智型
${100-parseInt(document.getElementById("lg-percent").textContent)}% · Gentle 柔软感性型

${desc}`;

    navigator.clipboard.writeText(text).then(()=>toast("结果已复制到剪贴板")).catch(()=>toast("复制失败，请手动复制"));
}
