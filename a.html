        // 全局变量
        let currentQuestion = 0;
        let answers = [];
        let selected = null;

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // 切换页面
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        // 开始测试
        function startTest() {
            currentQuestion = 0;
            answers = [];
            selected = null;
            renderQuestion();
            showPage('test-page');
        }

        // 渲染题目
        function renderQuestion() {
            document.getElementById('question').textContent = questions[currentQuestion];
            document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / 40) * 100}%`;
            document.getElementById('progress-text').textContent = `${currentQuestion + 1} / 40`;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            const options = [
                { letter: "A", text: "完全符合" },
                { letter: "B", text: "比较符合" },
                { letter: "C", text: "中立/不确定" },
                { letter: "D", text: "不太符合" },
                { letter: "E", text: "完全不符合" }
            ];

            options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = `option ${answers[currentQuestion] === index ? 'selected' : ''}`;
                optionElement.innerHTML = `
                    <span class="option-letter">${option.letter}</span>
                    <span class="option-text">${option.text}</span>
                `;
                optionElement.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionElement);
            });

            // 更新按钮状态
            document.getElementById('prev-btn').disabled = currentQuestion === 0;
            document.getElementById('next-btn').disabled = answers[currentQuestion] === undefined;
            document.getElementById('next-btn').textContent = currentQuestion === 39 ? '查看结果' : '下一题';
        }

        // 选择选项
        function selectOption(index) {
            selected = index;
            answers[currentQuestion] = index;
            renderQuestion();
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // 下一题
        function nextQuestion() {
            if (answers[currentQuestion] === undefined) return;

            if (currentQuestion < 39) {
                currentQuestion++;
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // 计算结果
        function calculateResult() {
            const scoreMap = [4, 3, 2, 1, 0];
            const scores = [];

            for (let dim = 0; dim < 4; dim++) {
                const [posIdx, negIdx] = dimensionRules[dim];
                let total = 0;
                
                // 正向题计分
                for (const i of posIdx) {
                    total += scoreMap[answers[i]];
                }
                
                // 反向题倒置计分
                for (const i of negIdx) {
                    total += 4 - scoreMap[answers[i]];
                }
                
                scores.push(total);
            }

            // 生成编码
            let code = "";
            for (let i = 0; i < 4; i++) {
                const [high, low] = dimensionNames[i];
                code += scores[i] > 20 ? high : low;
            }

            // 显示结果
            const result = resultData[code];
            document.getElementById('result-code').textContent = `【${code}】`;
            document.getElementById('result-animal').textContent = result.animal;
            document.getElementById('result-desc').textContent = result.desc;

            showPage('result-page');
        }

        // 复制结果
        function copyResult() {
            const code = document.getElementById('result-code').textContent;
            const animal = document.getElementById('result-animal').textContent;
            const desc = document.getElementById('result-desc').textContent;
            const text = `我在「-不如诗啊- 林间生灵粉丝人格测试」中测出了【${code}】${animal}！\n\n${desc}\n\n快来测测你是哪种林间生灵吧：${window.location.href}`;

            navigator.clipboard.writeText(text).then(() => {
                showToast('结果已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败，请手动复制');
            });
        }

        // 重新测试
        function restartTest() {
            showPage('home-page');
        }
    </script>
